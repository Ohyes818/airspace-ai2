<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AIR SPACE AI｜支線款式評分</title>
  <style>
    :root {
      --nav:#101821; --nav2:#18222d; --brand:#bd1f4f; --ink:#102033; --muted:#66758a;
      --line:#d8e2ec; --bg:#f3f6fa; --panel:#fff; --hot:#fff1df; --hotText:#a95600;
      --slow:#eef3f8; --slowText:#48637d; --good:#0f766e; --warn:#b7791f; --bad:#bd1f4f;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Microsoft JhengHei",system-ui,-apple-system,"Segoe UI",sans-serif; color:var(--ink); background:var(--bg); }
    .app { display:grid; grid-template-columns:260px 1fr; min-height:100vh; }
    aside { background:var(--nav); color:#fff; padding:22px 16px; }
    .brand { display:flex; gap:12px; align-items:center; margin-bottom:30px; }
    .logo { width:48px; height:48px; border:1px solid #56616d; border-radius:8px; display:grid; place-items:center; font-weight:800; }
    .brand b { display:block; font-size:18px; }
    .brand span { color:#b7c3d0; font-size:13px; }
    nav a { display:block; color:#fff; text-decoration:none; padding:13px 14px; border-radius:8px; margin:5px 0; }
    nav a.active { background:#2b3440; }
    .sideBlock { border-top:1px solid #2d3945; margin-top:28px; padding-top:18px; display:grid; gap:13px; }
    .sideLine { display:flex; justify-content:space-between; color:#d7e2ec; }
    .sideLine b { color:#fff; }
    main { padding:18px 28px 40px; overflow:auto; }
    .sectionTitle { display:flex; justify-content:space-between; align-items:end; gap:18px; margin-bottom:14px; }
    h1,h2,h3 { margin:0; letter-spacing:0; }
    h1 { font-size:24px; }
    h2 { font-size:24px; margin-top:30px; }
    .branchBar { display:flex; gap:10px; flex-wrap:wrap; margin:10px 0 16px; }
    .branch { border:1px solid var(--line); background:#fff; min-width:150px; padding:12px 22px; border-radius:8px; text-align:center; font-weight:800; cursor:pointer; }
    .branch.active { background:var(--brand); color:#fff; border-color:var(--brand); }
    .controls { display:flex; gap:10px; align-items:center; }
    select,input,textarea,button { font:inherit; border:1px solid var(--line); border-radius:7px; background:#fff; padding:10px 12px; }
    button { background:var(--brand); color:#fff; border-color:var(--brand); cursor:pointer; font-weight:700; }
    button.secondary { background:#fff; color:var(--brand); }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .factorBox,.catCard,.uploadPanel,.resultPanel { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:16px; }
    .factorBox h3 { font-size:16px; margin-bottom:12px; }
    .chips { display:flex; flex-wrap:wrap; gap:8px; }
    .chip { display:inline-flex; gap:5px; align-items:center; border-radius:7px; padding:7px 9px; font-size:13px; background:#edf3f8; color:#24415f; }
    .chip.hot { background:var(--hot); color:var(--hotText); }
    .chip.slow { background:var(--slow); color:var(--slowText); }
    .catGrid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:14px; }
    .catHead { display:flex; justify-content:space-between; align-items:start; gap:12px; margin-bottom:10px; }
    .catHead h3 { font-size:20px; }
    .small { color:var(--muted); font-size:13px; line-height:1.5; }
    .labelCols { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .subhead { font-weight:800; font-size:13px; margin:8px 0; }
    .analysisLayout { display:grid; grid-template-columns:1fr 380px; gap:18px; align-items:start; }
    .drop { border:1px dashed #9fb4cb; border-radius:8px; padding:18px; background:#fbfdff; margin-bottom:12px; }
    .drop strong { display:block; margin-bottom:9px; }
    textarea { width:100%; min-height:150px; resize:vertical; margin:8px 0; }
    .apiRow { display:grid; grid-template-columns:1fr auto; gap:8px; margin:8px 0; }
    .status { color:var(--muted); font-size:13px; margin-top:8px; min-height:20px; }
    .cards { display:grid; gap:12px; }
    .itemCard { display:grid; grid-template-columns:110px 1fr; gap:12px; border:1px solid var(--line); border-radius:8px; padding:10px; background:#fff; }
    .thumb { width:110px; height:140px; object-fit:cover; border-radius:7px; background:#eef2f6; }
    .itemTop { display:flex; justify-content:space-between; gap:8px; align-items:start; }
    .score { font-size:22px; font-weight:900; color:#fff; background:var(--brand); min-width:54px; text-align:center; border-radius:8px; padding:8px 9px; }
    .score.good { background:var(--good); }
    .score.warn { background:var(--warn); }
    .tags { display:flex; flex-wrap:wrap; gap:6px; margin:8px 0; }
    .tag { background:#eef3f8; border-radius:7px; padding:5px 8px; font-size:12px; color:#24415f; }
    .decision { display:flex; gap:8px; align-items:center; margin-top:8px; }
    .decision b { color:var(--good); }
    .decision b.watch { color:var(--warn); }
    .decision b.bad { color:var(--bad); }
    .empty { border:1px dashed var(--line); border-radius:8px; padding:28px; text-align:center; color:var(--muted); background:#fff; }
    @media (max-width:1100px) { .app { grid-template-columns:1fr; } aside { position:static; } .analysisLayout,.grid2,.catGrid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand"><div class="logo">AS</div><div><b>AIR SPACE AI</b><span>商品企劃分析系統</span></div></div>
      <nav>
        <a class="active" href="#factor">銷售分析</a>
        <a href="#factor">支線因素</a>
        <a href="#upload">圖片分析</a>
      </nav>
      <div class="sideBlock">
        <div class="small" style="color:#e24b77">目前設定</div>
        <div class="sideLine"><span>品牌支線</span><b id="sideBranch">AS</b></div>
        <div class="sideLine"><span>暢銷定義</span><b id="sideHot">上衣/洋裝前三；其他第一</b></div>
        <div class="sideLine"><span>滯銷定義</span><b id="sideSlow">上衣/洋裝後三；其他最後</b></div>
      </div>
    </aside>
    <main>
      <section id="factor">
        <div class="sectionTitle">
          <div>
            <div class="small" style="color:#bd1f4f">功能 1</div>
            <h1>依品項熱銷 / 滯銷標籤分析</h1>
          </div>
          <div class="controls">
            <select id="categoryFilter"><option value="全部品類">全部品類</option></select>
            <button id="refreshFactors">重新分析</button>
          </div>
        </div>
        <div id="branches" class="branchBar"></div>
        <div class="grid2">
          <div class="factorBox"><h3>熱銷元素</h3><div id="overallHot" class="chips"></div></div>
          <div class="factorBox"><h3>滯銷元素</h3><div id="overallSlow" class="chips"></div></div>
        </div>
        <div id="categoryCards" class="catGrid"></div>
      </section>

      <section id="upload">
        <div class="small" style="color:#bd1f4f; margin-top:26px">功能 2</div>
        <h2>上傳圖片分析</h2>
        <div class="analysisLayout">
          <div class="resultPanel">
            <div id="results" class="cards"><div class="empty">尚未上傳圖片。</div></div>
          </div>
          <div class="uploadPanel">
            <div class="drop">
              <strong>一次可上傳至少 30 張商品圖</strong>
              <div class="small">支援 JPG、PNG、WEBP。系統會依目前支線的分類暢滯銷因素評分。</div>
              <input id="files" type="file" accept="image/*" multiple />
            </div>
            <label class="small"><b>圖片分析補充說明</b></label>
            <textarea id="note" placeholder="可描述這批圖片共同特徵，例如：短版、削肩、蕾絲、收腰、偏歐美微性感。"></textarea>
            <button id="analyzeBtn" style="width:100%">分析上傳圖片</button>
            <div id="status" class="status">上傳圖片後，網站會自動依目前支線的暢滯銷因素分析評分。</div>
          </div>
        </div>
      </section>
    </main>
  </div>

    let activeBranch = APP.branches[0];

    };
    function esc(v) { return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function chip(row, type) { return `<span class="chip ${type}">${esc(row.feature)} <b>${row.count ?? row.hot_count ?? row.slow_count ?? ''}</b></span>`; }
    function renderBranch() {
      els.branches.innerHTML = APP.branches.map(b => `<button class="branch ${b.id===activeBranch.id?'active':''}" data-id="${b.id}">${esc(b.name)}</button>`).join('');
      els.branches.querySelectorAll('button').forEach(btn => btn.onclick = () => {
        activeBranch = APP.branches.find(b => b.id === btn.dataset.id);
        renderAll();
      });
      document.getElementById('sideBranch').textContent = activeBranch.name;
      document.getElementById('sideHot').textContent = activeBranch.hotDefinition;
      document.getElementById('sideSlow').textContent = activeBranch.slowDefinition;
    }
    function renderFilters() {
      const old = els.categoryFilter.value;
      els.categoryFilter.innerHTML = '<option value="全部品類">全部品類</option>' + activeBranch.categories.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
      if ([...els.categoryFilter.options].some(o => o.value === old)) els.categoryFilter.value = old;
    }
    function renderFactors() {
      const selected = els.categoryFilter.value;
      const cards = selected === '全部品類' ? activeBranch.categoryCards : activeBranch.categoryCards.filter(c => c.category === selected);
      const hot = selected === '全部品類'
        ? activeBranch.overviewHot
        : (cards[0]?.hotFactors || []).map(r => ({ feature:r.feature, count:r.hot_count }));
      const slow = selected === '全部品類'
        ? activeBranch.overviewSlow
        : (cards[0]?.slowFactors || []).map(r => ({ feature:r.feature, count:r.slow_count }));
      els.overallHot.innerHTML = hot.map(r => chip(r, 'hot')).join('') || '<span class="small">暫無資料</span>';
      els.overallSlow.innerHTML = slow.map(r => chip(r, 'slow')).join('') || '<span class="small">暫無資料</span>';

    function renderAll() { renderBranch(); renderFilters(); renderFactors(); }

    function detectCode(name) {
      const m = String(name).toUpperCase().match(/\b[A-Z]{1,5}\d{2,7}[A-Z]{0,4}\b/);
      return m ? m[0] : '';
    }
    function fileToDataUrl(file) {

        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
    function rulesFor(category) { return activeBranch.rules.filter(r => r.category === category && r.score_weight !== 0); }
    function scoreItem(item) {
      let score = 6.5;
      const notes = [];
      const labels = activeBranch.labelsByCode[item.code] || [];
      const featureNotes = [];
      for (const f of item.features || []) {
        const r = rulesFor(item.category).find(x => x.feature === f);
        if (!r) continue;
        score += r.score_weight * 0.55;
        featureNotes.push(`${f}${r.score_weight > 0 ? '加分' : '扣分'}`);
      }
      if (labels.length) {
        const hot = labels.filter(x => x.label.includes('暢銷')).length;
        const slow = labels.filter(x => x.label.includes('滯銷')).length;
        score += (hot - slow) * 0.45;
        notes.push(`歷史標籤：${labels.map(x => x.period + x.label).join('、')}`);
      }
      if (item.summary) notes.push(item.summary);
      if (featureNotes.length) notes.push(`依${item.category}因素：${featureNotes.join('、')}`);
      score = Math.max(1, Math.min(10, Math.round(score * 10) / 10));
      const decision = score >= 8 ? ['立即開發','good'] : score >= 6.5 ? ['觀察後開發','watch'] : ['不建議開發','bad'];
      return { score, decision, notes: notes.join('\n') || '等待圖片分析。' };

        body:JSON.stringify({
          branchName: activeBranch.name,
          categories: activeBranch.categories,
          factorText: factors,
          note: els.note.value || '',
          imageDataUrl: item.dataUrl
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'AI 分析失敗');
      const parsed = data;
      if (activeBranch.categories.includes(parsed.category)) item.category = parsed.category;
      const allowed = new Set(activeBranch.featuresByCategory[item.category] || []);
      item.features = Array.isArray(parsed.features) ? parsed.features.filter(f => allowed.has(f) || f) : [];
      item.title = parsed.title || item.title;
      item.summary = parsed.summary || '';
      item.source = 'AI分析';
    }
    async function runAnalysis() {
      if (!state.length) {
        els.status.textContent = '尚未上傳圖片。';
        return;
      }
      for (let i=0; i<state.length; i++) {
        try { await analyzeItem(state[i], i, state.length); }
        catch(err) { state[i].summary = 'AI 分析失敗：' + String(err.message || err).slice(0, 160); }
        renderResults();
      }
      els.status.textContent = `已用 OpenAI Vision 分析 ${state.length} 張圖片，並依 ${activeBranch.name} 支線因素評分。`;
    }
    els.files.addEventListener('change', async () => {
      state.splice(0, state.length);
      for (const file of Array.from(els.files.files || [])) {
        const dataUrl = await fileToDataUrl(file);
        const code = detectCode(file.name);
        const known = activeBranch.knownItems[code];
        state.push({
          name:file.name, title: known?.name || file.name.replace(/\.[^.]+$/,''),
          url:URL.createObjectURL(file), dataUrl, code,
          category: known?.category || '上衣', features: [], summary:'',
          source: known ? '歷史款號' : '待分析'
        });
      }
      els.status.textContent = `已選擇 ${state.length} 張圖片。`;
      renderResults();
      runAnalysis();
    });
    document.getElementById('analyzeBtn').onclick = runAnalysis;
    renderAll();
  </script>
</body>
</html>
